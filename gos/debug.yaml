#default GOS_CONFIG_logger no
#default GOS_CONFIG_debug no

#if GOS_CONFIG_logger
logger:
#ifdef GOS_USER_maarten
#ifdef GOS_BSP_growBoardCpu0	    // xxx move to growBoardCpu0 BSP
  hardware_uart: USB_CDC
  // deassert_rts_dtr: true
  //baud_rate: 921600
#else // ! GOS_BSP_growBoardCpu0
  hardware_uart: USB_CDC
  // XXX setup secondary in env.yaml
  // hardware_uart: UART0
  // baud_rate: 115200
#endif // ! GOS_BSP_growBoardCpu0
#else
  # baud_rate: 115200
  baud_rate: 921600
  hardware_uart: UART0
#endif
    # level: ERROR
  level: DEBUG
    # level: VERBOSE
  logs:
    # ili9xxx.component: VERBOSE
    component: DEBUG
    # component: VERBOSE

#endif // GOS_CONFIG_logger

#if GOS_CONFIG_debug
debug:
  update_interval: 15s

sensor:
  - platform: uptime
    name: System Uptime
    update_interval: 15s

sensor:
  - platform: debug
    free:
      name: "System Heap Free"
    block:
      name: "System Heap Max Block"
    loop_time:
      name: "System Loop Time"
    psram:
      name: "System Free PSRAM"

text_sensor:
  - platform: debug
    // device:
    //   name: "System Info"
    reset_reason:
      name: "System Reset Reason"

#endif // GOS_CONFIG_debug
