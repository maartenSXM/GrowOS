#if GB_CONFIG_LVGL_BOOT_LOGO
image:
  - file: 'https://esphome.io/_images/logo.png'
    id: boot_logo
    resize: 200x200
    type: RGB565
#endif // GB_CONFIG_LVGL_BOOT_LOGO

lvgl:
  log_level: INFO
  displays:
    - display_id: my_display
  # buffer_size: 25%
  touchscreens:
    - touchscreen_id: my_touchScreen
  default_font: montserrat_28
  disp_bg_color: 0x000000
  update_interval: 2s
#if GB_CONFIG_LVGL_IDLE
  on_idle:
    timeout: !lambda "return (id(display_timeout).state * 1000);"
    then:
      - logger.log: "LVGL is idle"
      - light.turn_off: light_TFT_BACKLIGHT
      - lvgl.pause:
#endif
  pages:
    - id: main_page
      widgets:
        - label:
            align: CENTER
            text: 'Hello World!'
            text_color: 0xFF0000
#if GB_CONFIG_LVGL_BOOT_LOGO
  top_layer:
    widgets:
     - obj:
          id: boot_screen
          x: 0
          y: 0
          width: 100%
          height: 100%
          bg_color: 0xFFFFFF
          bg_opa: COVER
          radius: 0
          pad_all: 0
          border_width: 0
          widgets:
            - img:
                align: CENTER
                src: boot_logo
                y: -40
            - spinner:
                align: CENTER
                y: 95
                height: 50
                width: 50
                spin_time: 1s
                arc_length: 60deg
                arc_width: 8
                indicator:
                  arc_color: 0x404040
                  arc_width: 8
          on_press:
            - lvgl.widget.hide: boot_screen
#endif

