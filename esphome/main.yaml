#default GOS_BSP_SERIAL_NUM 000
#default GOS_BSP_esphome_name \
		    GOS_STRINGIFY4(gos,GOS_PROJTAG,-,GOS_BSP_SERIAL_NUM)

#include "env.yaml"
#include "globals.yaml"
#include "numbers.yaml"
#include "debug.yaml"
#include "sensor.yaml"
#include "network.yaml"

// now include the app from ./apps

#default GOS_APP GOS_BSP_APP
#include GOS_STRINGIFY(GOS_APP)	    // from directory apps

#if GOS_CONFIG_DISPLAY
# include "display.yaml"
