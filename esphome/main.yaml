#  yaml style comments are allowed and stripped by $(CPT_HOME)/dehash.sh

// C-style comments are stripped by the C preprocessor
/* traditional C-ctyle comments are also stripped by the C preprocessor */
/* #default BLORT ... is a c preprocessor macro that generates:
 *	#ifndef BLORT
 *	#define BLORT ...
 *	#endif
 * and it is expanded by $(CPT_HOME)/dehash.sh. It is not
 * supported natively by the C preprocessor.
 */

#include "gos.h"

#include "bsp.yaml"		    // from directory bsps/GOS_BSP

// if bsp.yaml did not set these c preprocessor defines, default them

