// Find esp-idf versions that are compatible with platform IO here:
// 		https://github.com/platformio/platform-espressif32/releases
// 		and choose one and look in release notes to see which ESP_IDF
//		version(s) it supports.
// 
// These are known good pairs for platformio + esp-idf (TBD for esphome):
//	v5.3.0 PIO with 4.4.3 IDF
//	v5.4.0 PIO with 4.4.5 IDF
//	v6.0.1 PIO with 5.0.0 IDF
//	v6.1.0 PIO with 5.0.1 IDF
//	v6.2.0 PIO with 5.0.1 IDF
//	v6.3.2 PIO with 5.0.2 IDF
//	v6.3.1 PIO with 5.0.2 IDF
//	v6.3.0 PIO with 5.0.2 IDF
//	v6.4.0 PIO with 5.1.1 IDF
//	v6.5.0 PIO with 5.1.2 IDF
//	v6.6.0 PIO with 5.2.1 IDF
//	v6.7.0 PIO with 5.2.1 IDF 
//	v6.8.1 PIO with 5.3.0 IDF 

#define PIO_VERSION	6.8.1
#define IDF_VERSION	5.3.0

esphome:
  name: GOS_BSP_esphome_name

  includes:
    - GOS_HOME/gos/gos.h
    - GOS_HOME/GOS_BSP/bsp.h
    - GOS_HOME/GOS_BSP/configBsp.h
    - GOS_HOME/bsps/common/configBspAll.h
    - GOS_HOME/configAll.h

#if GOS_CONFIG_NET_WIFI
    - GOS_HOME/utils/idfWifi.h
    - GOS_HOME/utils/idfWifi.c
#endif

#if GOS_CONFIG_TINYUSB && GOS_CONFIG_USB_ACM
    - GOS_HOME/utils/idfUsb.h
    - GOS_HOME/utils/idfUsb.c
#endif

#if GOS_CONFIG_NET_TELNET_SERVER
    - GOS_HOME/utils/telnetd.h
    - GOS_HOME/utils/telnetd.c
    - GOS_HOME/utils/webApi.h
    - GOS_HOME/utils/webApi.c
#endif

#if GOS_CONFIG_ESP32_CAMERA
esphome:
  libraries:
    - espressif/esp32-camera
#endif

#if GOS_CONFIG_CONSOLE
esphome:
  libraries:
    - GOS_HOME/libraries/console
#endif // GOS_CONFIG_CONSOLE

#if GOS_CONFIG_NET_TELNET_SERVER
esphome:
  libraries:
    // - 'file://../../../'GOS_HOME'/libraries/libtelnet'
    - GOS_HOME/../../../libraries/libtelnet
#endif

#if GOS_CONFIG_TINYUSB
esphome:
  libraries:
    - "file://components/tinyusb"
    - "file://components/esp_tinyusb"
#endif

esphome:
  platformio_options:
    // board_upload.maximum_size: 1500000
    // uncomment this -Werror=all so exceptions can be defined below
    // build_unflags: -Werror=all
    build_flags:
      // we pass these GrowOS defines into platformio builds so that C/C++
      // code compiled by platformio can have them defined correctly.
      - -I GOS_HOME/../../..
      - -I GOS_HOME/../../../gos
      - -I GOS_HOME/../../../apps
      - -I GOS_HOME/../../../bsps/GOS_BSP
      - -D "GOS_HOME"=GOS_HOME
      - -D "GOS_USER_"GOS_USER=1
      - -D "GOS_USER"=GOS_USER
      - -D "GOS_PROJECT_"GOS_PROJECT=1
      - -D "GOS_PROJECT"=GOS_PROJECT
      - -D "GOS_PROJDIR"=GOS_PROJDIR
      - -D "GOS_BSP"=GOS_BSP

#ifdef GOS_BSP_HAS_psram
      - -D CONFIG_SPIRAM_CACHE_WORKAROUND
      - -D BOARD_HAS_PSRAM
      - -mfix-esp32-psram-cache-issue
      - -mfix-esp32-psram-cache-strategy=memw
#endif

#ifdef GOS_BSP_growBoardCpu0
#if GOS_CONFIG_TINYUSB
      - -I components/tinyusb/src
      - -I components/esp_tinyusb/device/esp_tinyusb/include
      - -D CONFIG_TINYUSB_ENABLED=1	  // tinyusb doesnt include sdkconfig.h
      - -D CONFIG_TINYUSB_CDC_ENABLED=1   // tinyusb doesnt include sdkconfig.h
      - -D CFG_TUSB_MCU=900		  // for tinyusb tusb_option.h (ESP32S2)
      - -D CFG_TUSB_OS_INC_PATH=freertos/ // for tinyusb tusb_compiler.h
#endif

#if GOS_CONFIG_CONSOLE
    // Enable FreeRTOS stats formatting functions, needed for 'tasks' command
      - -D CONFIG_FREERTOS_USE_TRACE_FACILITY=1
      - -D CONFIG_FREERTOS_USE_STATS_FORMATTING_FUNCTIONS=1
#endif

#if GOS_CONFIG_ESP32_CAMERA
      - -D ESP_LWIP_COMPONENT_BUILD
      - -D CONFIG_SCCB_CLK_FREQ=100000
      - -I .piolibdeps/GOS_NAME/esp32-camera/target/jpeg_include
#endif
#else // ! GOS_BSP_growBoardCpu0
      - "-DESP_LWIP_COMPONENT_BUILD -Werror=all -Wno-error=format -mfix-esp32-psram-cache-issue"
#endif // ! GOS_BSP_growBoardCpu0
      // add -DESP_LWIP_COMPONENT_BUILD so esp_sntp.h doesn't redeclare fns
      // - "-Werror=all"
      // add -Wno-warn=deprecated-declarations for sntp_* --> esp_sntp_*
      // add -Wno-error=maybe-uninitialized for old ft63x6 external source

    // upload_protocol: espota
    // upload_port: GOS_BSP_esphome_name.local
    // upload_port: $GOS_IP_ADDR
    // board_build.partitions: "partitions.csv"

#ifdef GOS_BSP_growBoardCpu0
#if GOS_CONFIG_USB_ACM
esphome:
  on_boot:
  - priority: 80
    then:
      lambda: idfUsbInit();
#endif // GOS_CONFIG_USB_ACM
#endif // GOS_BSP_growBoardCpu0

esp32:
  // board, variant and flash_size are declared in the BSP
#if GOS_CONFIG_CONSOLE
  partitions: _PROJDIR/partitions.csv
#endif

  framework:
    type:    esp-idf
    version: IDF_VERSION
    platform_version: PIO_VERSION

#if GOS_CONFIG_TINYUSB
    components:
      - name: tinyusb
        source: "github://espressif/tinyusb@v0.14.3"
      - name: esp_tinyusb
        source: "github://espressif/esp-usb/device/esp_tinyusb"
#endif

    sdkconfig_options:
      CONFIG_COMPILER_OPTIMIZATION_SIZE: y

      CONFIG_ESP32S2_SPIRAM_SUPPORT: y
      CONFIG_SPIRAM_USE_MALLOC: y
      CONFIG_SPIRAM_ALLOW_BSS_SEG_EXTERNAL_MEMORY: y     // allow bss in PSRAM
      CONFIG_SPIRAM_ALLOW_NOINIT_SEG_EXTERNAL_MEMORY: y  // same for uninit 
      CONFIG_SPIRAM_ALLOW_STACK_EXTERNAL_MEMORY: y	 // allow PSRAM stacks
      // CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL: "16384" // less than get internal

      CONFIG_LWIP_IPV6: n
      CONFIG_LWIP_LOCAL_HOSTNAME: STR_NAME

      // CONFIG_ESP_PHY_ENABLE_USB: y
      // CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG: n
      // CONFIG_ESP_CONSOLE_UART_DEFAULT: n
      CONFIG_ESP_CONSOLE_USB_CDC: y
      CONFIG_ESP_CONSOLE_USB_CDC_RX_BUF_SIZE: "128"
      CONFIG_ESP_CONSOLE_USB_CDC_SUPPORT_ETS_PRINTF: y

#if GOS_CONFIG_TINYUSB
      CONFIG_TINYUSB: y
      CONFIG_TINYUSB_DESC_MANUFACTURER_STRING: "CyberGrow"
      CONFIG_TINYUSB_DESC_PRODUCT_STRING: "GrowBox v1.0"
      CONFIG_TINYUSB_DESC_CDC_STRING: "CyberGrow CDC Device"
      CONFIG_TINYUSB_CDC_ENABLED: y
      CONFIG_TINYUSB_CDC_COUNT: "2"
      CONFIG_TINYUSB_MSC_ENABLED: n
#endif

      // XXX not sure if these are still needed.  Take out?
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "20"
      CONFIG_BOOTLOADER_WDT_TIME_MS: "12000"
      CONFIG_ESP_INT_WDT_TIMEOUT_MS: "500"
      CONFIG_ESP_TASK_WDT_CHECK_IDLE_TASK_CPU0: n

     // with both of these, cache isn't disabled during SPI1 flash ops
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

    advanced:
      ignore_efuse_mac_crc: false

// XXX move these out to where needed
#if GOS_CONFIG_LVGL
#if 0
packages:
  lvgl: !include lvgl-package.yaml
#endif
#if 0
external_components:
  - source: 'github://pr#6363'
    refresh: 1000min
    components: [lvgl]
#endif
#endif // GOS_CONFIG_LVGL

#if GOS_CONFIG_SERIAL_SERVER
external_components:
  - source: 'github://oxan/esphome-stream-server'
    refresh: 1000min
    components: [stream_server]
#endif // GOS_CONFIG_SERIAL_SERVER



