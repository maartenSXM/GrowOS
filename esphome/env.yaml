  #define _ID(x) x
  #define _STR(x) #x
  #define STR(x) _STR(x)
  #define DEF_CAT4(w,x,y,z) STR(_ID(w)_ID(x)_ID(y)_ID(z))
  #define DEF_CAT3(w,x,y)   STR(_ID(w)_ID(x)_ID(y))
  #define DEF_CAT2(w,x)     STR(_ID(w)_ID(x))
  #define DEF_CAT(w,x)      STR(_ID(w)_ID(x))
  #define DEF_NAME(w,x,y,z) _ID(w)_ID(x)_ID(y)_ID(z)

  #define GB_NAME  DEF_NAME(gb,_SERIALNO,cpu,_CPU)
  #define STR_NAME STR(GB_NAME)

  // Find esp-idf versions that are compatible with platform IO here:
  // 		https://github.com/platformio/platform-espressif32/tags
  // 		and choose one and look in release notes to see which ESP_IDF
  //		version(s) it supports.
  // 
  // These are known good pairs:
  //	5.3.0 PIO with 4.4.3 IDF
  //	6.3.2 PIO with 5.0.2 IDF
  //	6.4.0 PIO with 5.1.1 IDF
  //	6.5.0 PIO with 5.1.2 IDF
  //	6.6.0 PIO with 5.2.1 IDF
  //	6.7.0 PIO with 5.1.2 IDF // or newer? (i.e. backport?)

  #define IDF_VERSION	5.2.1	// can also be: latest, recommended or dev
  #define PIO_VERSION	6.6.0	// can also be: develop, master

  #define PIO_URL https:_ID(/)_ID(/)github.com/platformio/platform-espressif32.git
  #define PIO_BRANCH DEF_CAT4(PIO_URL,#,v,PIO_VERSION)

esphome:
  name: STR_NAME
  includes:
    - config.h
    - pins.h
    - esp-idf.h
    - esp-idf.c
#if _CPU == 0 && GB_CONFIG_ESP32_CAMERA
  libraries:
    - espressif/esp32-camera
#endif
  platformio_options:
    upload_speed: 1500000
    board_build.mcu: esp32s2
    board_build.flash_size: 4MB
#if GB_CONFIG_RUN_FAST
    board_build.flash_mode: qout	// qio also an option
    board_build.f_flash: 40000000L	// should be 80Mhz?
    board_build.f_cpu: 240000000L
#else
    board_build.flash_mode: dout	// dio also an option
    board_build.f_flash: 40000000L
    board_build.f_cpu: 160000000L
#endif
    board_upload.maximum_size: 1500000
    // uncomment this -Werror=all so exceptions can be defined below
    // build_unflags: -Werror=all
    build_flags:
      - "-DCONFIG_SPIRAM_CACHE_WORKAROUND"
      - "-DBOARD_HAS_PSRAM"
      - "-mfix-esp32-psram-cache-issue"
      - "-mfix-esp32-psram-cache-strategy=memw"
#if _CPU == 0 && GB_CONFIG_ESP32_CAMERA
      - "-DESP_LWIP_COMPONENT_BUILD"
      - "-DCONFIG_SCCB_CLK_FREQ=100000"
      - DEF_CAT3(-I.piolibdeps/,GB_NAME,/esp32-camera/target/jpeg_include)
#else
      - "-DESP_LWIP_COMPONENT_BUILD -Werror=all -mfix-esp32-psram-cache-issue"
#endif
      // add -DESP_LWIP_COMPONENT_BUILD so esp_sntp.h doesn't redeclare fns
      // - "-Werror=all"
      // add -Wno-warn=deprecated-declarations for sntp_* --> esp_sntp_*
      // add -Wno-error=maybe-uninitialized for old ft63x6 external source

    // upload_protocol: espota
    // upload_port: DEF_NAME(_SERIALNO,_CPU).local
    // upload_port: $GB_IP_ADDR
    // board_build.partitions: "partitions.csv"

#if _CPU == 0
#if GB_CONFIG_APP0_LED || GB_CONFIG_DISPLAY
  on_boot:
#endif
#if GB_CONFIG_APP0_LED
    - output.turn_on: my_led  
    - output.set_level:
        id: my_led
        level: "90%"
#endif // GB_CONFIG_APP0_LED
#if GB_CONFIG_DISPLAY
    - light.turn_on: light_TFT_BACKLIGHT
#if GB_CONFIG_LVGL && GB_CONFIG_LVGL_BOOT_LOGO
    - delay: 5s
    - lvgl.widget.hide: boot_screen
#endif // GB_CONFIG_LVGL && GB_CONFIG_LVGL_BOOT_LOGO
#endif // GB_CONFIG_DISPLAY
#endif // _CPU == 0

esp32:
  board: esp32-s2-kaluga-1
  variant: esp32s2
  framework:
    type: esp-idf
    version: IDF_VERSION
    platform_version: PIO_BRANCH

    sdkconfig_options:
      CONFIG_COMPILER_OPTIMIZATION_SIZE: y
#if GB_CONFIG_RUN_FAST
      CONFIG_SOC_MEMSPI_SRC_FREQ_80M_SUPPORTED: y
      CONFIG_ESPTOOLPY_FLASHFREQ_40M: y
      CONFIG_ESP32S2_DEFAULT_CPU_FREQ_240: y
      CONFIG_ESP32S2_DEFAULT_CPU_FREQ_MHZ: "240"
      CONFIG_ESPTOOLPY_FLASHMODE_QOUT: y
      CONFIG_ESPTOOLPY_FLASHMODE: "qout"
#else
      CONFIG_ESPTOOLPY_FLASHFREQ_40M: y
      CONFIG_ESP32S2_DEFAULT_CPU_FREQ_160: y
      CONFIG_ESP32S2_DEFAULT_CPU_FREQ_MHZ: "160"
      CONFIG_ESPTOOLPY_FLASHMODE_DOUT: y
      CONFIG_ESPTOOLPY_FLASHMODE: "dout"
#endif
      CONFIG_ESPTOOLPY_OCT_FLASH: y
      CONFIG_ESPTOOLPY_FLASHSIZE_4MB: y
      CONFIG_SPI_FLASH_VERIFY_WRITE: y

      CONFIG_ESP32S2_DATA_CACHE_16KB: y
      CONFIG_ESP32S2_INSTRUCTION_CACHE_16KB: y

      CONFIG_ESP32S2_SPIRAM_SUPPORT: y
      CONFIG_SPIRAM_ALLOW_BSS_SEG_EXTERNAL_MEMORY: y // move lwip bss to PSRAM
      CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL: "16384"   // less than get internal
      CONFIG_SPIRAM_USE_MALLOC: y

      CONFIG_LWIP_IPV6: n
      CONFIG_LWIP_LOCAL_HOSTNAME: STR_NAME

      // CONFIG_USB_OTG_SUPPORTED: n
      // CONFIG_SOC_USB_OTG_SUPPORTED: n
      // CONFIG_USB_ENABLED: y
      // CONFIG_ESP_PHY_ENABLE_USB: y
      // CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG: n
      // CONFIG_ESP_CONSOLE_UART_DEFAULT: n
      // CONFIG_ESP_CONSOLE_USB_CDC: y

      // XXX not sure if these are still needed.  Take out?
      // CONFIG_ESP_TASK_WDT_TIMEOUT_S: "20"
      // CONFIG_BOOTLOADER_WDT_TIME_MS: "12000"
      // CONFIG_ESP_INT_WDT_TIMEOUT_MS: "500"

     // with both of these, cache isn't disabled during SPI1 flash ops
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

      // CONFIG_SPIRAM_SPEED_120M: y	// experimental
      // CONFIG_SPIRAM_MODE_OCT: y	// experimental
#if _CPU == 0 && GB_CONFIG_32_KHZ_XTAL
      CONFIG_ESP32S2_RTC_CLK_SRC_EXT_CRYS: y
      CONFIG_ESP32S2_RTC_CLK_CAL_CYCLES: "576"
#endif // GB_CONFIG_32_KHZ_XTAL

#if _CPU == 0 && GB_CONFIG_ESP32_CAMERA
      CONFIG_OV2640_SUPPORT: y
      CONFIG_SCCB_HARDWARE_I2C_PORT1: y
      CONFIG_SCCB_CLK_FREQ: "100000"
      CONFIG_CAMERA_TASK_STACK_SIZE: "2048"
      CONFIG_CAMERA_NO_AFFINITY: y
      CONFIG_CAMERA_DMA_BUFFER_SIZE_MAX: "32768"
      # CONFIG_LCD_CAM_ISR_IRAM_SAFE: y
      // added for GB_CONFIG_ESP32_CAMERA to build
      // CONFIG_IDF_TARGET_ESP32: "1"
#endif // GB_CONFIG_ESP32_CAMERA

    advanced:
      ignore_efuse_mac_crc: false

psram:
  mode: octal
#if GB_CONFIG_RUN_FAST
  speed: 80Mhz
#else
  speed: 40Mhz
#endif

