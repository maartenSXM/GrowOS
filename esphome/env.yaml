esphome:
  #define DEF_CAT2(x,y) x ## y
  #define DEF_CAT(x,y) DEF_CAT2(x,y)
  #define DEF_NAME2(x,y) gb ## x ## cpu ## y
  #define DEF_NAME(x,y) DEF_NAME2(x,y)
  name: DEF_NAME(_SERIALNO,_CPU)
  // to include custom code file custom.c, uncomment the next line
  // includes: custom.c
  platformio_options:
    upload_speed: 1500000
    board_build.mcu: esp32s2
    board_build.flash_mode: dio
    board_build.f_flash: 40000000L
    board_build.flash_size: 4MB
    board_upload.maximum_size: 1500000
    // turning off -Werror=all so we can turn it on with exceptions below
    build_unflags: -Werror=all
    build_flags:
      - "-DESP_LWIP_COMPONENT_BUILD -Werror=all -mfix-esp32-psram-cache-issue -Wno-warn=deprecated-declarations"
      // add -DESP_LWIP_COMPONENT_BUILD so esp_sntp.h doesn't redeclare fns
      // add -Wno-warn=deprecated-declarations for sntp_* --> esp_sntp_*
      // add -Wno-error=maybe-uninitialized for old ft63x6 external source
    // upload_protocol: espota
    // upload_port: DEF_NAME(_SERIALNO,_CPU).local
    // upload_port: $GB_IP_ADDR
    // board_build.partitions: "partitions.csv"

esp32:
  board: esp32-s2-kaluga-1
  // board: esp-wrover-kit
  variant: esp32s2
  framework:
    type: esp-idf
    // type: arduino
    // version: 5.1.2
    version: latest
    // version: recommended
    // version: dev
    platform_version: "https://github.com/platformio/platform-espressif32.git#develop"
    // platform_version: "https://github.com/platformio/platform-espressif32.git"
    sdkconfig_options:
      CONFIG_COMPILER_OPTIMIZATION_SIZE: y
      CONFIG_ESPTOOLPY_FLASHFREQ_40M: y
      CONFIG_ESPTOOLPY_OCT_FLASH: y
      CONFIG_ESPTOOLPY_FLASHSIZE_4MB: y
      // CONFIG_TFT_SPI_FREQUENCY: "20000000"
      // CONFIG_TFT_SPI_READ_FREQ: "5000000"
      CONFIG_ESP32S2_SPIRAM_SUPPORT: y
      CONFIG_ESP32S2_RTC_CLK_SRC_EXT_CRYS: y
      CONFIG_ESP32S2_RTC_CLK_CAL_CYCLES: "576"
    advanced:
      ignore_efuse_mac_crc: false

psram:
  mode: octal
  speed: 40Mhz

// Enable logging
logger:
  baud_rate: 115200
  hardware_uart: UART0
  level: DEBUG
  // logs:
  // component: ERROR

debug:
  update_interval: 5s

