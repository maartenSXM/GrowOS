// Find esp-idf versions that are compatible with platform IO here:
// 		https://github.com/platformio/platform-espressif32/tags
// 		and choose one and look in release notes to see which ESP_IDF
//		version(s) it supports.
// 
// These are known good pairs:
//	v5.3.0 PIO with 4.4.3 IDF
//	v6.3.2 PIO with 5.0.2 IDF
//	v6.4.0 PIO with 5.1.1 IDF
//	v6.5.0 PIO with 5.1.2 IDF
//	v6.6.0 PIO with 5.2.1 IDF
//	v6.7.0 PIO with 5.1.2 IDF // or newer? (i.e. backport?)

#define IDF_VERSION	5.2.1	// e.g. 5.2.1, latest, recommended, dev
#define PIO_VERSION	v6.7.0	// e.g. v6.7.0, develop, master

#define PIO_URL https:_ID(/)_ID(/)github.com/platformio/platform-espressif32.git
#define PIO_BRANCH DEF_CAT3(PIO_URL,#,PIO_VERSION)

esphome:
  name: GOS_NAME_STR
#if _CPU == 0
//  build_path: ../build0
#else
//  build_path: ../build1
#endif
  includes:

    - config.h
    - pins.h

#if GOS_CONFIG_NET_WIFI
    - utils/idfWifi.h
    - utils/idfWifi.c
#endif

#if GOS_CONFIG_TINYUSB && GOS_CONFIG_USB_ACM
    - utils/idfUsb.h
    - utils/idfUsb.c
#endif

#if GOS_CONFIG_NET_TELNET_SERVER
    - utils/telnetd.h
    - utils/telnetd.c
    - utils/webApi.h
    - utils/webApi.c
#endif

#if GOS_CONFIG_ESP32_CAMERA	 || GOS_CONFIG_CONSOLE ||	    \
    GOS_CONFIG_NET_TELNET_SERVER || GOS_CONFIG_TINYUSB
  libraries:

#if GOS_CONFIG_ESP32_CAMERA
    - espressif/esp32-camera
#endif

#if GOS_CONFIG_CONSOLE
    - 'file://../../../libraries/console'
#endif // GOS_CONFIG_CONSOLE

#if GOS_CONFIG_NET_TELNET_SERVER
    - 'file://../../../libraries/libtelnet'
#endif

#if GOS_CONFIG_TINYUSB
    - "file://components/tinyusb"
    - "file://components/esp_tinyusb"
#endif

#endif // libraries:

  platformio_options:
    upload_speed: 1500000
    board_build.mcu: esp32s2
    board_build.flash_size: 4MB

#if GOS_CONFIG_RUN_FAST
    board_build.flash_mode: dout	// qio also an option
    board_build.f_flash: 40000000L	// should be 80Mhz?
    board_build.f_cpu: 240000000L
#else
    board_build.flash_mode: dout	// dio also an option
    board_build.f_flash: 40000000L
    board_build.f_cpu: 160000000L
#endif

    // board_upload.maximum_size: 1500000
    // uncomment this -Werror=all so exceptions can be defined below
    // build_unflags: -Werror=all
    build_flags:
      // we pass these five defines into platformio builds so that C/C++
      // code compiled by platformio can have them defined correctly.
      - DEF_CAT3(-D_USER_,_USER,=1)
      - DEF_CAT3(-D_PROJTAG_,_PROJTAG,=1)
      - -D_USER=_USER
      - -D_PROJTAG=_PROJTAG
      - -D_PROJDIR=_PROJDIR
      - -DCONFIG_SPIRAM_CACHE_WORKAROUND
      - -DBOARD_HAS_PSRAM
      - -mfix-esp32-psram-cache-issue
      - -mfix-esp32-psram-cache-strategy=memw

#if _CPU == 0
#if GOS_CONFIG_TINYUSB
      - "-Icomponents/tinyusb/src"
      - "-Icomponents/esp_tinyusb/device/esp_tinyusb/include"
      - "-DCONFIG_TINYUSB_ENABLED=1"	    // should get this from sdkconfig.h
      - "-DCONFIG_TINYUSB_CDC_ENABLED=1"    // should get this from sdkconfig.h
      - "-DCFG_TUSB_MCU=900"		    // tinyusb tusb_option.h (ESP32S2)
      - "-DCFG_TUSB_OS_INC_PATH=freertos/"  // tinyusb tusb_compiler.h
#endif

#if GOS_CONFIG_CONSOLE
    // Enable FreeRTOS stats formatting functions, needed for 'tasks' command
      - "-DCONFIG_FREERTOS_USE_TRACE_FACILITY=1"
      - "-DCONFIG_FREERTOS_USE_STATS_FORMATTING_FUNCTIONS=1"
#endif

#if GOS_CONFIG_ESP32_CAMERA
      - "-DESP_LWIP_COMPONENT_BUILD"
      - "-DCONFIG_SCCB_CLK_FREQ=100000"
      - DEF_CAT3(-I.piolibdeps/,GOS_NAME,/esp32-camera/target/jpeg_include)
#endif
#else // ! _CPU == 0
      - "-DESP_LWIP_COMPONENT_BUILD -Werror=all -Wno-error=format -mfix-esp32-psram-cache-issue"
#endif
      // add -DESP_LWIP_COMPONENT_BUILD so esp_sntp.h doesn't redeclare fns
      // - "-Werror=all"
      // add -Wno-warn=deprecated-declarations for sntp_* --> esp_sntp_*
      // add -Wno-error=maybe-uninitialized for old ft63x6 external source

    // upload_protocol: espota
    // upload_port: DEF_NAME(_SERIALNO,_CPU).local
    // upload_port: $GOS_IP_ADDR
    // board_build.partitions: "partitions.csv"

#if _CPU == 0
#if GOS_CONFIG_APP0_LED || GOS_CONFIG_DISPLAY ||	    \
    GOS_CONFIG_USB_ACM  || GOS_CONFIG_NET_TELNET_SERVER
  on_boot:

#if GOS_CONFIG_APP0_LED
  - priority: 600
    then:
      - output.turn_on: my_led  
      - output.set_level:
          id: my_led
          level: "90%"
#endif // GOS_CONFIG_APP0_LED

#if GOS_CONFIG_NET_TELNET_SERVER
  - priority: 200
    then:
      lambda: |-
        if (telnetServerInit() == ESP_FAIL)
            ESP_LOGD("telnetd", "Initializaton by switch failed");
        else
            ESP_LOGD("telnetd", "Initializaton succeeded");
#endif // GOS_CONFIG_TELNET_SERVER

#if GOS_CONFIG_DISPLAY
  - priority: 50
    then:
      - light.turn_on: light_TFT_BACKLIGHT
#if GOS_CONFIG_LVGL && GOS_CONFIG_LVGL_BOOT_LOGO
      - delay: 5s
      - lvgl.widget.hide: boot_screen
#endif // GOS_CONFIG_LVGL && GOS_CONFIG_LVGL_BOOT_LOGO
#endif // GOS_CONFIG_DISPLAY

#if GOS_CONFIG_USB_ACM
  - priority: 80
    then:
      lambda: idfUsbInit();
#endif // GOS_CONFIG_USB_ACM

#endif // on_boot:
#endif // _CPU == 0

esp32:
  board: esp32-s2-kaluga-1
  variant: esp32s2
  flash_size: 4MB
  partitions: _PROJDIR/partitions.csv

  framework:
    type: esp-idf
    version: IDF_VERSION
    platform_version: PIO_BRANCH

#if GOS_CONFIG_TINYUSB
    components:
      - name: tinyusb
        source: "github://espressif/tinyusb@v0.14.3"
      - name: esp_tinyusb
        source: "github://espressif/esp-usb/device/esp_tinyusb"
#endif

    sdkconfig_options:
      CONFIG_COMPILER_OPTIMIZATION_SIZE: y

#if GOS_CONFIG_RUN_FAST
      CONFIG_SOC_MEMSPI_SRC_FREQ_80M_SUPPORTED: y
      CONFIG_ESPTOOLPY_FLASHFREQ_40M: y
      CONFIG_ESP32S2_DEFAULT_CPU_FREQ_240: y
      CONFIG_ESP32S2_DEFAULT_CPU_FREQ_MHZ: "240"
      CONFIG_ESPTOOLPY_FLASHMODE_DOUT: y
      CONFIG_ESPTOOLPY_FLASHMODE: "dout"
      // CONFIG_SPIRAM_SPEED_120M: y	// experimental
      // CONFIG_SPIRAM_MODE_OCT: y	// experimental

#else
      CONFIG_ESPTOOLPY_FLASHFREQ_40M: y
      CONFIG_ESP32S2_DEFAULT_CPU_FREQ_160: y
      CONFIG_ESP32S2_DEFAULT_CPU_FREQ_MHZ: "160"
      CONFIG_ESPTOOLPY_FLASHMODE_DOUT: y
      CONFIG_ESPTOOLPY_FLASHMODE: "dout"
#endif

      CONFIG_ESPTOOLPY_OCT_FLASH: y
      CONFIG_ESPTOOLPY_FLASHSIZE_4MB: y
      CONFIG_SPI_FLASH_VERIFY_WRITE: y

      CONFIG_ESP32S2_DATA_CACHE_16KB: y
      CONFIG_ESP32S2_INSTRUCTION_CACHE_16KB: y

      CONFIG_ESP32S2_SPIRAM_SUPPORT: y
      CONFIG_SPIRAM_USE_MALLOC: y
      CONFIG_SPIRAM_ALLOW_BSS_SEG_EXTERNAL_MEMORY: y     // allow bss in PSRAM
      CONFIG_SPIRAM_ALLOW_NOINIT_SEG_EXTERNAL_MEMORY: y  // same for uninit 
      CONFIG_SPIRAM_ALLOW_STACK_EXTERNAL_MEMORY: y	 // allow PSRAM stacks
      // CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL: "16384" // less than get internal

      CONFIG_LWIP_IPV6: n
      CONFIG_LWIP_LOCAL_HOSTNAME: STR_NAME

      // CONFIG_ESP_PHY_ENABLE_USB: y
      // CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG: n
      // CONFIG_ESP_CONSOLE_UART_DEFAULT: n
      CONFIG_ESP_CONSOLE_USB_CDC: y
      CONFIG_ESP_CONSOLE_USB_CDC_RX_BUF_SIZE: "128"
      CONFIG_ESP_CONSOLE_USB_CDC_SUPPORT_ETS_PRINTF: y

#if GOS_CONFIG_TINYUSB
      CONFIG_TINYUSB: y
      CONFIG_TINYUSB_DESC_MANUFACTURER_STRING: "CyberGrow"
      CONFIG_TINYUSB_DESC_PRODUCT_STRING: "GrowBox v1.0"
      CONFIG_TINYUSB_DESC_CDC_STRING: "CyberGrow CDC Device"
      CONFIG_TINYUSB_CDC_ENABLED: y
      CONFIG_TINYUSB_CDC_COUNT: "2"
      CONFIG_TINYUSB_MSC_ENABLED: n
#endif

      // XXX not sure if these are still needed.  Take out?
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "20"
      CONFIG_BOOTLOADER_WDT_TIME_MS: "12000"
      CONFIG_ESP_INT_WDT_TIMEOUT_MS: "500"
      CONFIG_ESP_TASK_WDT_CHECK_IDLE_TASK_CPU0: n

     // with both of these, cache isn't disabled during SPI1 flash ops
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

#if _CPU == 0 && GOS_CONFIG_32_KHZ_XTAL
      CONFIG_ESP32S2_RTC_CLK_SRC_EXT_CRYS: y
      CONFIG_ESP32S2_RTC_CLK_CAL_CYCLES: "576"
#endif // GOS_CONFIG_32_KHZ_XTAL

#if _CPU == 0 && GOS_CONFIG_ESP32_CAMERA
      CONFIG_OV2640_SUPPORT: y
      CONFIG_SCCB_HARDWARE_I2C_PORT1: y
      CONFIG_SCCB_CLK_FREQ: "100000"
      CONFIG_CAMERA_TASK_STACK_SIZE: "2048"
      CONFIG_CAMERA_NO_AFFINITY: y
      CONFIG_CAMERA_DMA_BUFFER_SIZE_MAX: "32768"
      # CONFIG_LCD_CAM_ISR_IRAM_SAFE: y
      // added for GOS_CONFIG_ESP32_CAMERA to build
      // CONFIG_IDF_TARGET_ESP32: "1"
#endif // GOS_CONFIG_ESP32_CAMERA

    advanced:
      ignore_efuse_mac_crc: false

psram:
  mode: octal
#if GOS_CONFIG_RUN_FAST
  speed: 80Mhz
#else
  speed: 40Mhz
#endif

#if GOS_CONFIG_DISPLAY_3_BIT || GOS_CONFIG_LVGL || GOS_CONFIG_SERIAL_SERVER
external_components:

#if GOS_CONFIG_DISPLAY_3_BIT
// added 3-bit mode to the display driver
#if _USER_maarten
  - source:
      type: local
      path: ~/git/esphome_components/components
#else
  - source: 'github://maartenSXM/esphome_components'
#endif
    components: [ili9xxx]
#endif // GOS_CONFIG_DISPLAY_3_BIT

#if GOS_CONFIG_LVGL
  - source: 'github://pr#6363'
    refresh: 1000min
    components: [lvgl]
#endif // GOS_CONFIG_LVGL

#if GOS_CONFIG_SERIAL_SERVER
  - source: 'github://oxan/esphome-stream-server'
    refresh: 1000min
    components: [stream_server]
#endif // GOS_CONFIG_SERIAL_SERVER

#endif // external_components:

