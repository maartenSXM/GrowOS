esphome.on_boot:
 priority: -100
 then:
   - output.turn_on:
       my_slow_pwm  
   - output.set_level:
       id: my_slow_pwm
       level: "90%"
#endif

#if GB_CONFIG_APP0_LED
light:
  - platform: status_led
    id: cpu0_status_led
    name: "CPU0 Status LED"
    pin: _PIN_TempData
    effects:
      - strobe:
          name: blink
          colors:
            - state: true
              duration: 400ms
            - state: false
              duration: 100ms
#endif // GB_CONFIG_APP0_LED

#if GB_CONFIG_BUZZER == 1
output:
  - platform: ledc
    pin: _PIN_BUZZER
    id: buzzer_out
#endif // GB_CONFIG_BUZZER == 1

switch:
  - platform: gpio
    id: switch_H_S_ENABLE
    name: "CPU1 Enable"
    pin:
      number: _PIN_H_S_ENABLE
      mode: output
#if GB_CONFIG_CPU1_DEFAULTS_ON == 1
    restore_mode: ALWAYS_ON
#else
    restore_mode: ALWAYS_OFF
#endif // GB_CONFIG_CPU1_DEFAULTS_ON == 1

  - platform: gpio
    id: switch_TFT_PWR_EN
    name: "CPU0 Display Enable"
    pin:
      number: _PIN_TFT_PWR_EN
      mode: output
    inverted: true
#if GB_CONFIG_TFT_PWR_DEFAULTS_ON == 1
    restore_mode: ALWAYS_ON
#else
    restore_mode: ALWAYS_OFF
#endif // GB_CONFIG_TFT_PWR_DEFAULTS_ON == 1

  - platform: gpio
    id: switch_TFT_BACKLIGHT
    name: "CPU0 Backlight Enable"
    pin:
      number: _PIN_TFT_BACKLIGHT
      mode: output
    inverted: true
#if GB_CONFIG_TFT_BACKLIGHT_DEFAULTS_ON == 1
    restore_mode: ALWAYS_ON
#else
    restore_mode: ALWAYS_OFF
#endif // GB_CONFIG_TFT_BACKLIGHT_DEFAULTS_ON == 1

  - platform: restart
    name: "System Reboot"

#if GB_CONFIG_BUZZER == 1
#if GB_CONFIG_BUZZER_MONOTONE == 1
  - platform: output
    name: "CPU0 Buzzer"
    id: buzzer
    output: buzzer_out
    on_turn_on: 
      then:
        - output.turn_on: buzzer_out
        - output.ledc.set_frequency:
            id: buzzer_out
            frequency: "1000Hz"
        - output.set_level:
            id: buzzer_out
            level: "50%"
    on_turn_off:
      then:
        - output.turn_off: buzzer_out

#else // GB_CONFIG_BUZZER_MONOTONE == 0

rtttl:
  output: buzzer_out

button:
  - platform: template
    name: "Buzzer play"
    on_press:
      then:
        - rtttl.play: 'mission_imp:d=16,o=6,b=95:32d,32d#,32d,32d#,32d,32d#,32d,32d#,32d,32d,32d#,32e,32f,32f#,32g,g,8p,g,8p,a#,p,c7,p,g,8p,g,8p,f,p,f#,p,g,8p,g,8p,a#,p,c7,p,g,8p,g,8p,f,p,f#,p,a#,g,2d,32p,a#,g,2c#,32p,a#,g,2c,a#5,8c,2p,32p,a#5,g5,2f#,32p,a#5,g5,2f,32p,a#5,g5,2e,d#,8d'
  - platform: template
    name: "Buzzer stop"  
    on_press:
      then:
        - rtttl.stop

#endif // GB_CONFIG_BUZZER_MONOTONE == 0
#endif // GB_CONFIG_BUZZER == 1
