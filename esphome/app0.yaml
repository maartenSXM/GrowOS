#if GB_CONFIG_APP0_LED
light:
  - platform: status_led
    id: cpu0_status_led
    name: "CPU0 Status LED"
    pin: _PIN_TempData
    effects:
      - strobe:
          name: blink
          colors:
            - state: true
              duration: 900ms
            - state: false
              duration: 100ms
#endif // GB_CONFIG_APP0_LED

output:
  - platform: ledc
    pin: _PIN_BUZZER
    id: buzzer_output

#if 0
  - platform: slow_pwm
    pin: _PIN_TempData
    id: my_slow_pwm
    period: 500ms
    restart_cycle_on_state_change: true
#endif

switch:
  - platform: gpio
    id: switch_H_S_ENABLE
    name: "CPU1 Enable"
    pin:
      number: _PIN_H_S_ENABLE
      mode: output
#if GB_CONFIG_CPU1_DEFAULTS_ON == 1
    restore_mode: ALWAYS_ON
#else
    restore_mode: ALWAYS_OFF
#endif // GB_CONFIG_CPU1_DEFAULTS_ON == 1

  - platform: gpio
    id: switch_TFT_PWR_EN
    name: "CPU0 Display Enable"
    pin:
      number: _PIN_TFT_PWR_EN
      mode: output
    inverted: true
#if GB_CONFIG_TFT_PWR_DEFAULTS_ON == 1
    restore_mode: ALWAYS_ON
#else
    restore_mode: ALWAYS_OFF
#endif // GB_CONFIG_TFT_PWR_DEFAULTS_ON == 1

  - platform: gpio
    id: switch_TFT_BACKLIGHT
    name: "CPU0 Backlight Enable"
    pin:
      number: _PIN_TFT_BACKLIGHT
      mode: output
    inverted: true
#if GB_CONFIG_TFT_BACKLIGHT_DEFAULTS_ON == 1
    restore_mode: ALWAYS_ON
#else
    restore_mode: ALWAYS_OFF
#endif // GB_CONFIG_TFT_BACKLIGHT_DEFAULTS_ON == 1

  - platform: restart
    name: "System Reboot"

#if 0
  - platform: gpio
    pin:
      number: _PIN_TempData
      mode: output
    id: led
#endif

  - platform: output
    name: "CPU0 Buzzer"
    id: buzzer
    output: buzzer_output
    on_turn_on: 
      then:
        - output.turn_on: buzzer_output
        - output.ledc.set_frequency:
            id: buzzer_output
            frequency: "1000Hz"
        - output.set_level:
            id: buzzer_output
            level: "50%"

    on_turn_off:
      then:
        - output.turn_off: buzzer_output

