#if GB_CONFIG_APP0_LED
light:
  - platform: status_led
    id: cpu0_status_led
    name: "CPU0 Status LED"
    pin: _PIN_TempData
    effects:
      - strobe:
          name: blink
          colors:
            - state: true
              duration: 400ms
            - state: false
              duration: 100ms
#endif // GB_CONFIG_APP0_LED

#if GB_CONFIG_BUZZER
output:
  - platform: ledc
    pin: _PIN_BUZZER
    id: buzzer_out
    channel: 2 // xxx config item?
#endif // GB_CONFIG_BUZZER

switch:
#if GB_CONFIG_TRISTATE_UART_SWITCH
  - platform: template
    name: "Tristate UART0"
    optimistic: true
    # restore_mode: ALWAYS_OFF
    turn_on_action:
      lambda: |-
        espIdfUart0enable();
    turn_off_action:
      lambda: |-
        espIdfUart0disable();
#endif // GB_CONFIG_TRISTATE_UART_SWITCH

  - platform: gpio
    id: switch_H_S_ENABLE
    name: "CPU1 Enable"
    pin:
      number: _PIN_H_S_ENABLE
      mode: output
#if GB_CONFIG_CPU1_DEFAULTS_ON
    restore_mode: ALWAYS_ON
#else
    restore_mode: ALWAYS_OFF
#endif // GB_CONFIG_CPU1_DEFAULTS_ON

#if GB_CONFIG_DISPLAY
  - platform: gpio
    id: switch_TFT_PWR_EN
    name: "CPU0 Display Enable"
    pin:
      number: _PIN_TFT_PWR_EN
      mode: output
    inverted: true
#if GB_CONFIG_TFT_PWR_DEFAULTS_ON
    restore_mode: ALWAYS_ON
#else
    restore_mode: ALWAYS_OFF
#endif // GB_CONFIG_TFT_PWR_DEFAULTS_ON

  - platform: gpio
    id: switch_TFT_BACKLIGHT
    name: "CPU0 Backlight Enable"
    pin:
      number: _PIN_TFT_BACKLIGHT
      mode: output
    inverted: true
#if GB_CONFIG_TFT_BACKLIGHT_DEFAULTS_ON
    restore_mode: ALWAYS_ON
#else
    restore_mode: ALWAYS_OFF
#endif // GB_CONFIG_TFT_BACKLIGHT_DEFAULTS_ON
#endif // GB_CONFIG_DISPLAY

#if GB_CONFIG_CAMERA
  - platform: gpio
    id: switch_CAMERA
    name: "CPU0 Camera Enable"
    pin:
      number: _PIN_CSI_PWR_EN
      mode: output
    inverted: true
#if GB_CONFIG_CAMERA_DEFAULTS_ON
    restore_mode: ALWAYS_ON
#else
    restore_mode: ALWAYS_OFF
#endif // GB_CONFIG_CAMERA_DEFAULTS_ON
#endif // GB_CONFIG_CAMERA
#
  - platform: restart
    name: "System Reboot"

#if GB_CONFIG_BUZZER
#if GB_CONFIG_BUZZER_MONOTONE
  - platform: output
    name: "CPU0 Buzzer"
    id: buzzer
    output: buzzer_out
    on_turn_on: 
      then:
        - delay: 0ms
        - output.turn_on: buzzer_out
        - output.ledc.set_frequency:
            id: buzzer_out
            frequency: "1000Hz"
        - output.set_level:
            id: buzzer_out
            level: "50%"
    on_turn_off:
      then:
        - delay: 0ms
        - output.turn_off: buzzer_out

#else // !GB_CONFIG_BUZZER_MONOTONE

rtttl:
  output: buzzer_out

button:
  - platform: template
    name: "Buzzer play"
    on_press:
      then:
        - rtttl.play: 'mission_imp:d=16,o=6,b=95:32d,32d#,32d,32d#,32d,32d#,32d,32d#,32d,32d,32d#,32e,32f,32f#,32g,g,8p,g,8p,a#,p,c7,p,g,8p,g,8p,f,p,f#,p,g,8p,g,8p,a#,p,c7,p,g,8p,g,8p,f,p,f#,p,a#,g,2d,32p,a#,g,2c#,32p,a#,g,2c,a#5,8c,2p,32p,a#5,g5,2f#,32p,a#5,g5,2f,32p,a#5,g5,2e,d#,8d'
  - platform: template
    name: "Buzzer stop"  
    on_press:
      then:
        - rtttl.stop

#endif // !GB_CONFIG_BUZZER_MONOTONE
#endif // GB_CONFIG_BUZZER

#if GB_CONFIG_CAMERA
esp32_camera:
  // HW settings
  external_clock:
    pin:
      number: _PIN_CSI_XCLK
      allow_other_uses: true
    frequency: 20MHz
  i2c_pins:
    sda:
      number: _PIN_TWI_SDA
      allow_other_uses: true
    scl:
      number: _PIN_TWI_SCK
      allow_other_uses: true
  data_pins:
    [
    {number: _PIN_CSI_D2, allow_other_uses: true},
    {number: _PIN_CSI_D3, allow_other_uses: true},
    _PIN_CSI_D4,
    {number: _PIN_CSI_D5, allow_other_uses: true},
    _PIN_CSI_D6,
    _PIN_CSI_D7,
    _PIN_CSI_D8,
    _PIN_CSI_D9
    ]
  vsync_pin: _PIN_CSI_VSYNC
  href_pin:
    number: _PIN_CSI_HREF
    allow_other_uses: true
  pixel_clock_pin: _PIN_CSI_PCLK

  // Image settings
  name: My Camera
  // ...
#endif // GB_CONFIG_CAMERA

