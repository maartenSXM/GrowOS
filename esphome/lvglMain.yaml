#if GB_CONFIG_LVGL_BOOT_LOGO
image:
  - file: 'https://esphome.io/_images/logo.png'
    id: boot_logo
    resize: 200x200
    type: RGB565
#endif // GB_CONFIG_LVGL_BOOT_LOGO

#define MY_FONT montserrat_18

lvgl:
  log_level: INFO
  displays:
    - display_id: my_display
  buffer_size: 50%
  touchscreens:
    - touchscreen_id: my_touchScreen
  default_font: MY_FONT
  disp_bg_color: 0x000000
  update_interval: 2s
#if GB_CONFIG_LVGL_IDLE
  on_idle:
    timeout: !lambda "return (id(display_timeout).state * 1000);"
    then:
      - logger.log: "LVGL is idle"
      - light.turn_off: light_TFT_BACKLIGHT
      - lvgl.pause:
#endif

#include "lvglTheme.yaml"

#include "lvglNavigation.yaml"
#if GB_CONFIG_LVGL_BOOT_LOGO
#include "lvglBootLogo.yaml"
#endif

  pages:
#include "pages/page1.yaml"
#include "pages/page2.yaml"
#include "pages/page3.yaml"
#include "pages/page4.yaml"

// Next are the page extras that are not part of the lvgl: definition

#include "pages/page1add.yaml"
#include "pages/page2add.yaml"
#include "pages/page3add.yaml"
#include "pages/page4add.yaml"
