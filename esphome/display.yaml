#if !GB_CONFIG_DISPLAY_LVGL
#include "nativeUiInit.yaml"
#endif // !GB_CONFIG_DISPLAY_LVGL

spi:
  clk_pin:
    number: _PIN_TFT_SCLK
#if GB_CONFIG_CAMERA
    allow_other_uses: true
#endif // GB_CONFIG_CAMERA
  mosi_pin:
    number: _PIN_TFT_MOSI
#if GB_CONFIG_CAMERA
    allow_other_uses: true
#endif // GB_CONFIG_CAMERA
  miso_pin:
    number: _PIN_TFT_MISO
#if GB_CONFIG_CAMERA
    allow_other_uses: true
#endif // GB_CONFIG_CAMERA
  interface: hardware

// for 3-bit or lvgl displays we need external components
#if GB_CONFIG_DISPLAY_3_BIT || GB_CONFIG_DISPLAY_LVGL
external_components:
#if GB_CONFIG_DISPLAY_3_BIT
// added 3-bit mode to the display driver
#if _USER_maarten
  - source:
      type: local
      path: ~/git/esphome_components/components
#else
  - source: 'github://maartenwrs/esphome_components'
#endif
    components: [ ili9xxx ]
#endif // GB_CONFIG_DISPLAY_3_BIT
#if GB_CONFIG_DISPLAY_LVGL
  - source: 'github://pr#6363'
    refresh: 1000min
    components: [lvgl]
#endif // GB_CONFIG_DISPLAY_LVGL
#endif // GB_CONFIG_DISPLAY_3_BIT || GB_CONFIG_DISPLAY_LVGL

display:
  - platform: ili9xxx
    model: ili9488_A
    spi_mode: mode3
    id: my_display
    dimensions:
      width: 480
      height: 320
      offset_height: 0
      offset_width: 0
#if GB_CONFIG_DISPLAY_3_BIT
    color_palette: 3_BIT
#endif // GB_CONFIG_DISPLAY_3_BIT
    color_order: bgr
    transform:
      mirror_y: false
      swap_xy: true
      mirror_x: false
    // rotation: 180
    invert_colors: false
    cs_pin:
      number: _PIN_TFT_CS
#if GB_CONFIG_CAMERA
      allow_other_uses: true
#endif
    dc_pin:
      number: _PIN_TFT_DC
#if GB_CONFIG_CAMERA
      allow_other_uses: true
#endif
    reset_pin: _PIN_TFT_RST
    data_rate: 40MHz
#if GB_CONFIG_DISPLAY_LVGL
    auto_clear_enabled: false
    update_interval: never
    # auto_clear_enabled: true
    # update_interval: 1000ms
    # pages:
    # - id: page1
    #   lambda: |-
    #     it.filled_circle(200, 120, 100, Color(255,0,0));
#include "lvglUi.yaml"
#else // !GB_CONFIG_DISPLAY_LVGL
    auto_clear_enabled: false
    # auto_clear_enabled: true
    update_interval: 1000ms
    // define some pages using native esphome graphics
#include "nativeUi.yaml"
#endif // !GB_CONFIG_DISPLAY_LVGL

i2c:
  id: i2cBusIntern
  sda: 
    number: _PIN_TWI_SDA
#if GB_CONFIG_CAMERA
    allow_other_uses: true
#endif
  scl:
    number: _PIN_TWI_SCK
#if GB_CONFIG_CAMERA
    allow_other_uses: true
#endif
  frequency: 400kHz
  scan: false

touchscreen:
 - platform: ft63x6
   id: my_touchScreen
   i2c_id: i2cBusIntern
   interrupt_pin: _PIN_CTP_IRQ
   transform:
     swap_xy: true
     mirror_x: true
#if 1
   on_touch:
     lambda: |-
       id(touchx) = touch.x;
       id(touchy) = touch.y;
       #  printf("x=%d, y=%d\n", touch.x, touch.y);
       printf("x=%d, y=%d\n", id(touchx), id(touchy));
#endif

