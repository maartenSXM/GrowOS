# Enable Home Assistant API
#api:
#   password: ""

ota:
  password: ""

web_server:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: !secret wifi_addr
    gateway: !secret wifi_gateway
    subnet: !secret wifi_netmask
    dns1: !secret wifi_gateway
  fast_connect: on

# Enable fallback hotspot (captive portal) in case wifi connection fails
# ap:
#   ssid: "Gbcpu0 Fallback Hotspot"
#   password: "2MVT9gyfV0D4"

captive_portal:
    
time:
 - platform: sntp
   id: sntp_time
   timezone: !secret ntp_timezone
   servers:
    - !secret ntp_server
   on_time_sync:
      then:
        - logger.log: "Synchronized sntp clock"

text_sensor:
  - platform: template
    name: "Date & Time"
    update_interval: 30s
    lambda: |-
      auto time_text = id(sntp_time).now().strftime("%H:%M:%S - %d-%m-%Y");
      return { time_text };
