spi:
  clk_pin: $PIN_TFT_SCLK
  mosi_pin: $PIN_TFT_MOSI
  miso_pin: $PIN_TFT_MISO
  interface: hardware

font:
  - file: 'fonts/arial.ttf'
    id: arial
    size: 24

# ft63x6 from github://gpambrozio/esphome@FT6336U-touch
#    mod done is to add swap_x_y directive
# ili9xx from github:esphome#dev
#    mod done is to enable SPI 4-wire 18-bit mode for ili9488
external_components:
  - source:
      type: local
      path: myComponents
    components: [ ili9xxx, ft63x6 ]

globals:
  - id: touchx
    type: unsigned int
    restore_value: no
    initial_value: '0'
  - id: touchy
    type: unsigned int
    restore_value: no
    initial_value: '0'

display:
  - platform: ili9xxx
    model: ili9488_A
    spi_mode: mode3
    id: my_display
    dimensions:
      width: 480
      height: 320
      offset_height: 0
      offset_width: 0
    color_order: bgr
    transform:
      mirror_y: false
      swap_xy: true
      mirror_x: true
    # rotation: 180
    invert_colors: false
    auto_clear_enabled: false
    cs_pin: $PIN_TFT_CS
    dc_pin: $PIN_TFT_DC
    reset_pin: $PIN_TFT_RST
    data_rate: 40MHz
    update_interval: 50ms
    # lambda: !include displayBlocks.yaml
    lambda: |-
      static int col = 255; // lets use 8 shades of r, g and b each
      if (id(touchx) != 0 && id(touchy) != 0)
        {
        int r = (col & 0x7) << 5;
        int g = (col & 0x38) << 2;
        int b = (col & 0x1c0) >> 1;
        // printf("r=%d, g=%d, b=%d\n", r, g, b);
        it.filled_circle(id(touchx), id(touchy), 30, Color(r,g,b));
        it.circle(id(touchx), id(touchy), 30, Color(0,0,0));
        id(touchx) = 0;
        id(touchy) = 0;
        col --;
        if (col == 0)
          col = 255;
        }

i2c:
  id: i2cBusIntern
  sda: $PIN_TWI_SDA
  scl: $PIN_TWI_SCK
  frequency: 400kHz
  scan: false

touchscreen:
 - platform: ft63x6
   id: tftTouch
   i2c_id: i2cBusIntern
   interrupt_pin: $PIN_CTP_IRQ
   swap_x_y: true
   on_touch:
     lambda: |-
       id(touchx) = touch.x;
       id(touchy) = touch.y;
       // printf("x=%d, y=%d\n", touch.x, touch.y);

#   - logger.log:
#       format: Touch at (%d, %d)
#       args: [touch.x, touch.y]
       
# Enable logging
logger:
  # level: DEBUG
  logs:
    component: ERROR

# Enable Home Assistant API
#api:
#   password: ""

ota:
  password: ""

web_server:

wifi:
  ssid: $GB_WIFI_SSID
  password: $GB_WIFI_PASSWORD
  manual_ip:
    static_ip: $GB_WIFI_ADDR
    gateway: $GB_WIFI_GATEWAY
    subnet: $GB_WIFI_NETMASK
    dns1: $GB_WIFI_GATEWAY
  fast_connect: on

