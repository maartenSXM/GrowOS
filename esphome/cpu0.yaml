substitutions:
  <<: !include pinsCpu0.yaml
  GB_WIFI_ADDR: 192.168.8.134
  GB_WIFI_GATEWAY: 192.168.8.1
  GB_WIFI_NETMASK: 255.255.255.0
  GB_WIFI_SSID: SkyNet
  GB_WIFI_PASSWORD: WestLake

<<: !include env.yaml

# flash the led using a slow software-based PWM
# esphome.on_boot:
#  priority: -100
#  then:
#    - output.turn_on:
#        my_slow_pwm  
#    - output.set_level:
#        id: my_slow_pwm
#        level: "90%"
