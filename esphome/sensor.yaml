sensor:
  - platform: internal_temperature
    name: "System Temperature"

  - platform: wifi_signal
    name: "Net WiFi Signal "
    update_interval: 15s

  - platform: uptime
    name: System Uptime 

  - platform: debug
    free:
      name: "System Heap Free"
#   fragmentation:
#      name: "Heap Frag"
    block:
      name: "System Heap Max Block"
    loop_time:
      name: "System Loop Time"
    psram:
      name: "System Free PSRAM"

text_sensor:
  - platform: template
    name: "Net SNTP Time"
    update_interval: 30s
    lambda: |-
      auto time_text = (std::string) "Unknown";
      if (id(sntpTime).now().is_valid())
        time_text = id(sntpTime).now().strftime("%d/%m/%Y %H:%M:%S");
      return time_text;

  - platform: template
    id: sntpBootTimeText
    name: "System Boot Time"
    # update_interval: never
    lambda: |-
      static char str[25];
      static time_t bootTime;

      if (bootTime == (time_t) 0)
        {
        if (!id(sntpTime).now().is_valid())
          return ((std::string) "Unknown");
        bootTime = id(sntpTime).now().timestamp;
        strftime(str, sizeof(str), "%d/%m/%Y %H:%M:%S", localtime(&bootTime));
        }
      return (std::string) str;

  - platform: wifi_info
    ip_address:
      name: Net IP Address
    ssid:
      name: Net WiFi SSID
    mac_address:
      name: Net MAC Address

  - platform: debug
    # device:
    #   name: "System Info"
    reset_reason:
      name: "System Reset Reason"

