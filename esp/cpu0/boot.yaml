color:
  - id: my_blue
    blue: 100%
  - id: my_red
    red: 100%
  - id: my_green
    green: 100%
  - id: my_white
    red: 100%
    blue: 100%
    green: 100%
  - id: my_yellow
    hex: ffff00

i2c:
  id: i2cBusIntern
  sda: $PIN_TWI_SDA
  scl: $PIN_TWI_SCK
  frequency: 400kHz
  scan: false

touchscreen:
 - platform: ft63x6
   id: tftTouch
   i2c_id: i2cBusIntern
   interrupt_pin: $PIN_CTP_IRQ
   swap_x_y: true
   on_touch:
     - logger.log:
         format: Touch at (%d, %d)
         args: [touch.x, touch.y]

# Enable logging
logger:
  level: DEBUG
  logs:
    component: ERROR

