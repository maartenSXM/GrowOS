# get the pin definitions for GrowBoard V1 CPU 0
<<: !include pins.yaml

esphome:
  name: gbcpu0
  platformio_options:
    board_build.mcu: esp32s2
    board_build.flash_mode: dio
    board_build.f_flash: 40000000L
    board_build.flash_size: 4MB
      # board_build.arduino.memory_type: opi
    board_upload.maximum_size: 1500000
    build_unflags: -Werror=all
    build_flags:
      - "-Werror=all -Wno-error=maybe-uninitialized -mfix-esp32-psram-cache-issue"

     # upload_protocol: espota
     # upload_port: gbcpu0.local
     # upload_port: 192.168.8.134
     # board_build.partitions: "partitions.csv"

  # flash the led using a slow software-based PWM
  on_boot:
    priority: -100
    then:
      - output.turn_on:
          my_slow_pwm  
      - output.set_level:
          id: my_slow_pwm
          level: "90%"

esp32:
  board: esp32-s2-kaluga-1
    # board: esp-wrover-kit
  variant: esp32s2
  framework:
    type: esp-idf
      # type: arduino
    version: 5.1.2
      # version: recommended
      #version: dev
    platform_version: "https://github.com/platformio/platform-espressif32.git#develop"
    # platform_version: "https://github.com/platformio/platform-espressif32.git"
    sdkconfig_options:
      CONFIG_COMPILER_OPTIMIZATION_SIZE: y
      CONFIG_ESPTOOLPY_FLASHFREQ_40M: y
      CONFIG_ESPTOOLPY_OCT_FLASH: y
      CONFIG_ESPTOOLPY_FLASHSIZE_4MB: y
      CONFIG_TFT_SPI_FREQUENCY: "20000000"
      CONFIG_TFT_SPI_READ_FREQ: "5000000"
      CONFIG_ESP32S2_SPIRAM_SUPPORT: y
      CONFIG_ESP32S2_RTC_CLK_SRC_EXT_CRYS: y
      CONFIG_ESP32S2_RTC_CLK_CAL_CYCLES: "576"
    advanced:
      ignore_efuse_mac_crc: false

psram:
  mode: octal
  speed: 40Mhz

output:
  - platform: ledc
    pin: $PIN_BUZZER
    id: buzzer_output

  - platform: slow_pwm
    pin: $PIN_TempData
    id: my_slow_pwm
    period: 500ms
    restart_cycle_on_state_change: true


switch:
  - platform: gpio
    id: switch_H_S_ENABLE
    name: "Secondary CPU Enable"
    pin:
      number: $PIN_H_S_ENABLE
      mode: output
    restore_mode: ALWAYS_ON

  - platform: gpio
    id: switch_TFT_PWR_EN
    name: "Display Enable"
    pin:
      number: $PIN_TFT_PWR_EN
      mode: output
    inverted: true
    restore_mode: ALWAYS_ON

  - platform: gpio
    id: switch_TFT_BACKLIGHT
    name: "Display Backlight"
    pin:
      number: $PIN_TFT_BACKLIGHT
      mode: output
    inverted: true
    restore_mode: ALWAYS_ON

#  - platform: gpio
#    pin:
#      number: $PIN_TempData
#      mode: output
#    id: led

  - platform: output
    name: "Buzzer"
    id: buzzer
    output: buzzer_output
    on_turn_on: 
      then:
        - output.turn_on: buzzer_output
        - output.ledc.set_frequency:
            id: buzzer_output
            frequency: "1000Hz"
        - output.set_level:
            id: buzzer_output
            level: "50%"

    on_turn_off:
      then:
        - output.turn_off: buzzer_output

