spi:
  clk_pin: $PIN_TFT_SCLK
  mosi_pin: $PIN_TFT_MOSI
  miso_pin: $PIN_TFT_MISO
  interface: hardware

font:
  - file: 'fonts/arial.ttf'
    id: arial
    size: 24

external_components:
  - source:
      type: local
      path: myComponents
    components: [ ili9xxx, ft63x6 ]
    # ft63x6 from github://gpambrozio/esphome@FT6336U-touch
    #    mod done is to add swap_x_y directive
    # ili9xx from github:esphome#dev
    #    mod done is to enable SPI 4-wire 18-bit mode for ili9488

display:
  - platform: ili9xxx
    model: ili9488_A
    spi_mode: mode3
    id: gbLcd
    dimensions:
      width: 480
      height: 320
      offset_height: 0
      offset_width: 0
    color_order: bgr
    transform:
      mirror_y: false
      swap_xy: true
      mirror_x: true
    # rotation: 180
    invert_colors: false
    auto_clear_enabled: false
    cs_pin: $PIN_TFT_CS
    dc_pin: $PIN_TFT_DC
    reset_pin: $PIN_TFT_RST
    data_rate: 40MHz
    update_interval: 100ms
    lambda: |-
      static int c = 256, x = 0, y = 0, rgb = 0;
      if (rgb == 0)
        it.filled_rectangle(x, y, 80, 64, Color(c-1, 0, 0));
      else
        if (rgb == 1)
           it.filled_rectangle(x, y, 80, 64, Color(0, c-1, 0));
        else
           it.filled_rectangle(x, y, 80, 64, Color(0, 0, c-1));
      x += 80, c-=8; 
      if (x == 480) x = 0, y += 64;
      if (y == 320) y = 0;
      if (c == 0) c = 256, x=0, y=0, rgb ++;
      if (rgb == 3) rgb = 0;

